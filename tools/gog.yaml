name: gog
description: Google Workspace CLI for Gmail, Calendar, Drive, Contacts, Sheets, and
  Docs.
triggers:
- gog
- google
- workspace
- gmail
instructions: '# gog


  Use `gog` for Gmail/Calendar/Drive/Contacts/Sheets/Docs. Requires OAuth setup.


  Setup (once)


  - `gog auth credentials /path/to/client_secret.json`

  - `gog auth add you@gmail.com --services gmail,calendar,drive,contacts,docs,sheets`

  - `gog auth list`


  Common commands


  - Gmail search: `gog gmail search ''newer_than:7d'' --max 10`

  - Gmail messages search (per email, ignores threading): `gog gmail messages search
  "in:inbox from:ryanair.com" --max 20 --account you@example.com`

  - Gmail send (plain): `gog gmail send --to a@b.com --subject "Hi" --body "Hello"`

  - Gmail send (multi-line): `gog gmail send --to a@b.com --subject "Hi" --body-file
  ./message.txt`

  - Gmail send (stdin): `gog gmail send --to a@b.com --subject "Hi" --body-file -`

  - Gmail send (HTML): `gog gmail send --to a@b.com --subject "Hi" --body-html "<p>Hello</p>"`

  - Gmail draft: `gog gmail drafts create --to a@b.com --subject "Hi" --body-file
  ./message.txt`

  - Gmail send draft: `gog gmail drafts send <draftId>`

  - Gmail reply: `gog gmail send --to a@b.com --subject "Re: Hi" --body "Reply" --reply-to-message-id
  <msgId>`

  - Calendar list events: `gog calendar events <calendarId> --from <iso> --to <iso>`

  - Calendar create event: `gog calendar create <calendarId> --summary "Title" --from
  <iso> --to <iso>`

  - Calendar create with color: `gog calendar create <calendarId> --summary "Title"
  --from <iso> --to <iso> --event-color 7`

  - Calendar update event: `gog calendar update <calendarId> <eventId> --summary "New
  Title" --event-color 4`

  - Calendar show colors: `gog calendar colors`

  - Drive search: `gog drive search "query" --max 10`

  - Contacts: `gog contacts list --max 20`

  - Sheets get: `gog sheets get <sheetId> "Tab!A1:D10" --json`

  - Sheets update: `gog sheets update <sheetId> "Tab!A1:B2" --values-json ''[["A","B"],["1","2"]]''
  --input USER_ENTERED`

  - Sheets append: `gog sheets append <sheetId> "Tab!A:C" --values-json ''[["x","y","z"]]''
  --insert INSERT_ROWS`

  - Sheets clear: `gog sheets clear <sheetId> "Tab!A2:Z"`

  - Sheet'
setup: 'Ensure binary installed: gog'

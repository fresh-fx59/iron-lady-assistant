name: bear-notes
description: Create, search, and manage Bear notes via grizzly CLI.
triggers:
- bear-notes
- create,
- search,
- manage
- bear
instructions: "# Bear Notes\n\nUse `grizzly` to create, read, and manage notes in\
  \ Bear on macOS.\n\nRequirements\n\n- Bear app installed and running\n- For some\
  \ operations (add-text, tags, open-note --selected), a Bear app token (stored in\
  \ `~/.config/grizzly/token`)\n\n## Getting a Bear Token\n\nFor operations that require\
  \ a token (add-text, tags, open-note --selected), you need an authentication token:\n\
  \n1. Open Bear \u2192 Help \u2192 API Token \u2192 Copy Token\n2. Save it: `echo\
  \ \"YOUR_TOKEN\" > ~/.config/grizzly/token`\n\n## Common Commands\n\nCreate a note\n\
  \n```bash\necho \"Note content here\" | grizzly create --title \"My Note\" --tag\
  \ work\ngrizzly create --title \"Quick Note\" --tag inbox < /dev/null\n```\n\nOpen/read\
  \ a note by ID\n\n```bash\ngrizzly open-note --id \"NOTE_ID\" --enable-callback\
  \ --json\n```\n\nAppend text to a note\n\n```bash\necho \"Additional content\" |\
  \ grizzly add-text --id \"NOTE_ID\" --mode append --token-file ~/.config/grizzly/token\n\
  ```\n\nList all tags\n\n```bash\ngrizzly tags --enable-callback --json --token-file\
  \ ~/.config/grizzly/token\n```\n\nSearch notes (via open-tag)\n\n```bash\ngrizzly\
  \ open-tag --name \"work\" --enable-callback --json\n```\n\n## Options\n\nCommon\
  \ flags:\n\n- `--dry-run` \u2014 Preview the URL without executing\n- `--print-url`\
  \ \u2014 Show the x-callback-url\n- `--enable-callback` \u2014 Wait for Bear's response\
  \ (needed for reading data)\n- `--json` \u2014 Output as JSON (when using callbacks)\n\
  - `--token-file PATH` \u2014 Path to Bear API token file\n\n## Configuration\n\n\
  Grizzly reads config from (in priority order):\n\n1. CLI flags\n2. Environment variables\
  \ (`GRIZZLY_TOKEN_FILE`, `GRIZZLY_CALLBACK_URL`, `GRIZZLY_TIMEOUT`)\n3. `.grizzly.toml`\
  \ in current directory\n4. `~/.config/grizzly/config.toml`\n\nExample `~/.config/grizzly/config.toml`:\n\
  \n```toml\ntoken_file = \"~/.config/grizzly/token\"\ncallback_url = \"http://127.0.0.1:42123/success\"\
  \ntimeout = \"5s\"\n```\n\n## Notes\n\n- Bear must be running for commands to work\n\
  - Note IDs are Bear's internal identifiers (visible in note info or via callbacks)\n\
  - Use `--enable-callback` when you need to read data b"
setup: 'Ensure binary installed: grizzly'

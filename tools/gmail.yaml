name: gmail
description: Manage Gmail via the internal `gmail-gateway` service (gateway-only path).
tier: extended
risky: true
triggers:
- gmail
- google mail
- "@gmail.com"
- send via gmail
- delete gmail
instructions: |
  # Gmail (via `gmail-gateway`)

  Use this tool when the user explicitly asks to interact with Gmail.

  Scope for this setup:
  - Read/search Gmail messages
  - Send Gmail messages
  - Delete/trash Gmail messages

  Safety:
  - For send/delete actions, require explicit recipient/message target.
  - If recipient or target message is ambiguous, ask a clarifying question first.
  - Prefer listing/searching first, then acting on a specific message ID.

  Runtime mode:
  - This repository now treats `gmail-gateway` as the primary and only Gmail execution path.
  - Do not route Gmail actions through direct `gog gmail ...` commands for normal operations.

  Setup checks:
  - `python -m src.gmail_gateway.http --help`
  - `python -m src.gmail_gateway_cli --help`

  Common flows:
  - Account status: `python -m src.gmail_gateway_cli account-get --account you@gmail.com`
  - Connect account: `python -m src.gmail_gateway_cli account-connect --account you@gmail.com --redirect-url https://example.com/done`
  - Search: `python -m src.gmail_gateway_cli search --account you@gmail.com --query "in:inbox newer_than:7d" --page-size 20`
  - Read: `python -m src.gmail_gateway_cli read --account you@gmail.com --message-id <messageId>`
  - Send: `python -m src.gmail_gateway_cli send --account you@gmail.com --to bob@example.com --subject "Subject" --body "Text"`
  - Trash: `python -m src.gmail_gateway_cli trash --account you@gmail.com --message-id <messageId>`
  - Delete: `python -m src.gmail_gateway_cli delete --account you@gmail.com --message-id <messageId>`
setup: 'Ensure gateway is available: python -m src.gmail_gateway.http --help'

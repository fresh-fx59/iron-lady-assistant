openapi: 3.1.0
info:
  title: Gmail Gateway API
  version: 1.0.0-draft
  description: Internal API between assistant runtime and gmail-gateway service.
servers:
  - url: http://gmail-gateway.internal
security:
  - serviceToken: []
paths:
  /v1/accounts/{accountId}:
    get:
      summary: Get account status and auth state.
      operationId: getAccount
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Account state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Error'
  /v1/accounts/{accountId}/connect:
    post:
      summary: Start OAuth connect flow.
      operationId: startConnect
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
      responses:
        '202':
          description: Connect flow started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectResponse'
        default:
          $ref: '#/components/responses/Error'
  /v1/accounts/{accountId}/disconnect:
    post:
      summary: Revoke and disconnect account.
      operationId: disconnectAccount
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '204':
          description: Account disconnected.
        default:
          $ref: '#/components/responses/Error'
  /v1/oauth/callback:
    post:
      summary: Complete OAuth connect flow and persist tokens.
      operationId: oauthCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: Account connected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        default:
          $ref: '#/components/responses/Error'
  /v1/messages/send:
    post:
      summary: Send an email with idempotency enforcement.
      operationId: sendMessage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '202':
          description: Send accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryReceipt'
        default:
          $ref: '#/components/responses/Error'
  /v1/messages/search:
    post:
      summary: Search mailbox with Gmail query syntax.
      operationId: searchMessages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMessagesRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMessagesResponse'
        default:
          $ref: '#/components/responses/Error'
  /v1/messages/{messageId}:
    get:
      summary: Read a message.
      operationId: readMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/AccountIdHeader'
      responses:
        '200':
          description: Message details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayMessage'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Permanently delete a message (optional in v1).
      operationId: deleteMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/AccountIdHeader'
      responses:
        '202':
          description: Delete accepted.
        default:
          $ref: '#/components/responses/Error'
  /v1/messages/{messageId}/trash:
    post:
      summary: Move message to trash.
      operationId: trashMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/AccountIdHeader'
      responses:
        '202':
          description: Trash accepted.
        default:
          $ref: '#/components/responses/Error'
  /v1/sync/{accountId}/bootstrap:
    post:
      summary: Trigger full mailbox bootstrap sync.
      operationId: bootstrapSync
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '202':
          description: Bootstrap accepted.
        default:
          $ref: '#/components/responses/Error'
  /v1/sync/{accountId}/delta:
    post:
      summary: Trigger history-based delta sync.
      operationId: deltaSync
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeltaSyncRequest'
      responses:
        '202':
          description: Delta sync accepted.
        default:
          $ref: '#/components/responses/Error'
  /v1/watch/{accountId}/renew:
    post:
      summary: Renew Gmail watch for account.
      operationId: renewWatch
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchRenewRequest'
      responses:
        '202':
          description: Watch renewal accepted.
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    serviceToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AccountId:
      in: path
      name: accountId
      required: true
      schema:
        type: string
        minLength: 1
    MessageId:
      in: path
      name: messageId
      required: true
      schema:
        type: string
        minLength: 1
    AccountIdHeader:
      in: header
      name: X-Account-Id
      required: true
      schema:
        type: string
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    Error:
      description: Typed error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Account:
      type: object
      required: [account_id, status, auth_state, updated_at]
      properties:
        account_id:
          type: string
        status:
          type: string
          enum: [active, disabled, reauth_required]
        auth_state:
          type: string
          enum: [not_connected, connected, expired, revoked]
        email:
          type: string
          format: email
        updated_at:
          type: string
          format: date-time
    ConnectRequest:
      type: object
      required: [redirect_url]
      properties:
        redirect_url:
          type: string
          format: uri
    ConnectResponse:
      type: object
      required: [connect_url, expires_at]
      properties:
        connect_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    OAuthCallbackRequest:
      type: object
      required: [session_id, gmail_email, access_token, refresh_token, scopes]
      properties:
        session_id:
          type: string
        gmail_email:
          type: string
          format: email
        access_token:
          type: string
        refresh_token:
          type: string
        scopes:
          type: string
        expires_at:
          type: string
          format: date-time
    SendMessageRequest:
      type: object
      required: [account_id, to, subject, body_text]
      properties:
        account_id:
          type: string
        to:
          type: array
          minItems: 1
          items:
            type: string
            format: email
        cc:
          type: array
          items:
            type: string
            format: email
        bcc:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        thread_id:
          type: string
    SearchMessagesRequest:
      type: object
      required: [account_id, query]
      properties:
        account_id:
          type: string
        query:
          type: string
        page_token:
          type: string
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    SearchMessagesResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageSummary'
        next_page_token:
          type: string
    MessageSummary:
      type: object
      required: [message_id, thread_id, subject, from, internal_date]
      properties:
        message_id:
          type: string
        thread_id:
          type: string
        subject:
          type: string
        from:
          type: string
        snippet:
          type: string
        internal_date:
          type: string
          format: date-time
    GatewayMessage:
      allOf:
        - $ref: '#/components/schemas/MessageSummary'
        - type: object
          required: [body_text]
          properties:
            body_text:
              type: string
            body_html:
              type: string
            labels:
              type: array
              items:
                type: string
    DeliveryReceipt:
      type: object
      required: [receipt_id, account_id, status, queued_at]
      properties:
        receipt_id:
          type: string
        account_id:
          type: string
        status:
          type: string
          enum: [queued, sent, failed]
        provider_message_id:
          type: string
        queued_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
    DeltaSyncRequest:
      type: object
      required: [history_id]
      properties:
        history_id:
          type: string
    WatchRenewRequest:
      type: object
      required: [watch_expiration_ts]
      properties:
        watch_expiration_ts:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required: [code, message, class, retryable]
      properties:
        code:
          type: string
          enum:
            - retryable
            - reauth_required
            - policy_blocked
            - quota_limited
            - invalid_request
            - not_found
            - internal_error
        class:
          type: string
          description: Stable error family identifier.
        message:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true

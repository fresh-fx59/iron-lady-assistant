name: oracle
description: Best practices for using the oracle CLI (prompt + file bundling, engines,
  sessions, and file attachm
triggers:
- oracle
- best
- practices
- using
instructions: "# oracle \u2014 best use\n\nOracle bundles your prompt + selected files\
  \ into one \u201Cone-shot\u201D request so another model can answer with real repo\
  \ context (API or browser automation). Treat output as advisory: verify against\
  \ code + tests.\n\n## Main use case (browser, GPT\u20115.2 Pro)\n\nDefault workflow\
  \ here: `--engine browser` with GPT\u20115.2 Pro in ChatGPT. This is the common\
  \ \u201Clong think\u201D path: ~10 minutes to ~1 hour is normal; expect a stored\
  \ session you can reattach to.\n\nRecommended defaults:\n\n- Engine: browser (`--engine\
  \ browser`)\n- Model: GPT\u20115.2 Pro (`--model gpt-5.2-pro` or `--model \"5.2\
  \ Pro\"`)\n\n## Golden path\n\n1. Pick a tight file set (fewest files that still\
  \ contain the truth).\n2. Preview payload + token spend (`--dry-run` + `--files-report`).\n\
  3. Use browser mode for the usual GPT\u20115.2 Pro workflow; use API only when you\
  \ explicitly want it.\n4. If the run detaches/timeouts: reattach to the stored session\
  \ (don\u2019t re-run).\n\n## Commands (preferred)\n\n- Help:\n  - `oracle --help`\n\
  \  - If the binary isn\u2019t installed: `npx -y @steipete/oracle --help` (avoid\
  \ `pnpx` here; sqlite bindings).\n\n- Preview (no tokens):\n  - `oracle --dry-run\
  \ summary -p \"<task>\" --file \"src/**\" --file \"!**/*.test.*\"`\n  - `oracle\
  \ --dry-run full -p \"<task>\" --file \"src/**\"`\n\n- Token sanity:\n  - `oracle\
  \ --dry-run summary --files-report -p \"<task>\" --file \"src/**\"`\n\n- Browser\
  \ run (main path; long-running is normal):\n  - `oracle --engine browser --model\
  \ gpt-5.2-pro -p \"<task>\" --file \"src/**\"`\n\n- Manual paste fallback:\n  -\
  \ `oracle --render --copy -p \"<task>\" --file \"src/**\"`\n  - Note: `--copy` is\
  \ a hidden alias for `--copy-markdown`.\n\n## Attaching files (`--file`)\n\n`--file`\
  \ accepts files, directories, and globs. You can pass it multiple times; entries\
  \ can be comma-separated.\n\n- Include:\n  - `--file \"src/**\"`\n  - `--file src/index.ts`\n\
  \  - `--file docs --file README.md`\n\n- Exclude:\n  - `--file \"src/**\" --file\
  \ \"!src/**/*.test.ts\" --file \"!**/*.snap\"`\n\n- Defaults (implementation behavior):\n\
  \  - Default-ignored dirs: `node_mod"
setup: 'Ensure binary installed: oracle'

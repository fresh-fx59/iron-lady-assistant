name: summarize
description: "Summarize or extract text/transcripts from URLs, podcasts, and local\
  \ files (great fallback for \u201Ctran"
triggers:
- summarize
- summarize
- extract
- text/transcripts
- from
instructions: "# Summarize\n\nFast CLI to summarize URLs, local files, and YouTube\
  \ links.\n\n## When to use (trigger phrases)\n\nUse this skill immediately when\
  \ the user asks any of:\n\n- \u201Cuse summarize.sh\u201D\n- \u201Cwhat\u2019s this\
  \ link/video about?\u201D\n- \u201Csummarize this URL/article\u201D\n- \u201Ctranscribe\
  \ this YouTube/video\u201D (best-effort transcript extraction; no `yt-dlp` needed)\n\
  \n## Quick start\n\n```bash\nsummarize \"https://example.com\" --model google/gemini-3-flash-preview\n\
  summarize \"/path/to/file.pdf\" --model google/gemini-3-flash-preview\nsummarize\
  \ \"https://youtu.be/dQw4w9WgXcQ\" --youtube auto\n```\n\n## YouTube: summary vs\
  \ transcript\n\nBest-effort transcript (URLs only):\n\n```bash\nsummarize \"https://youtu.be/dQw4w9WgXcQ\"\
  \ --youtube auto --extract-only\n```\n\nIf the user asked for a transcript but it\u2019\
  s huge, return a tight summary first, then ask which section/time range to expand.\n\
  \n## Model + keys\n\nSet the API key for your chosen provider:\n\n- OpenAI: `OPENAI_API_KEY`\n\
  - Anthropic: `ANTHROPIC_API_KEY`\n- xAI: `XAI_API_KEY`\n- Google: `GEMINI_API_KEY`\
  \ (aliases: `GOOGLE_GENERATIVE_AI_API_KEY`, `GOOGLE_API_KEY`)\n\nDefault model is\
  \ `google/gemini-3-flash-preview` if none is set.\n\n## Useful flags\n\n- `--length\
  \ short|medium|long|xl|xxl|<chars>`\n- `--max-output-tokens <count>`\n- `--extract-only`\
  \ (URLs only)\n- `--json` (machine readable)\n- `--firecrawl auto|off|always` (fallback\
  \ extraction)\n- `--youtube auto` (Apify fallback if `APIFY_API_TOKEN` set)\n\n\
  ## Config\n\nOptional config file: `~/.summarize/config.json`\n\n```json\n{ \"model\"\
  : \"openai/gpt-5.2\" }\n```\n\nOptional services:\n\n- `FIRECRAWL_API_KEY` for blocked\
  \ sites\n- `APIFY_API_TOKEN` for YouTube fallback"
setup: 'Ensure binary installed: summarize'

instructions: "# OpenClaw Host Hardening\n\n## Overview\n\nAssess and harden the host\
  \ running OpenClaw, then align it to a user-defined risk tolerance without breaking\
  \ access. Use OpenClaw security tooling as a first-class signal, but treat OS hardening\
  \ as a separate, explicit set of steps.\n\n## Core rules\n\n- Recommend running\
  \ this skill with a state-of-the-art model (e.g., Opus 4.5, GPT 5.2+). The agent\
  \ should self-check the current model and suggest switching if below that level;\
  \ do not block execution.\n- Require explicit approval before any state-changing\
  \ action.\n- Do not modify remote access settings without confirming how the user\
  \ connects.\n- Prefer reversible, staged changes with a rollback plan.\n- Never\
  \ claim OpenClaw changes the host firewall, SSH, or OS updates; it does not.\n-\
  \ If role/identity is unknown, provide recommendations only.\n- Formatting: every\
  \ set of user choices must be numbered so the user can reply with a single digit.\n\
  - System-level backups are recommended; try to verify status.\n\n## Workflow (follow\
  \ in order)\n\n### 0) Model self-check (non-blocking)\n\nBefore starting, check\
  \ the current model. If it is below state-of-the-art (e.g., Opus 4.5, GPT 5.2+),\
  \ recommend switching. Do not block execution.\n\n### 1) Establish context (read-only)\n\
  \nTry to infer 1\u20135 from the environment before asking. Prefer simple, non-technical\
  \ questions if you need confirmation.\n\nDetermine (in order):\n\n1. OS and version\
  \ (Linux/macOS/Windows), container vs host.\n2. Privilege level (root/admin vs user).\n\
  3. Access path (local console, SSH, RDP, tailnet).\n4. Network exposure (public\
  \ IP, reverse proxy, tunnel).\n5. OpenClaw gateway status and bind address.\n6.\
  \ Backup system and status (e.g., Time Machine, system images, snapshots).\n7. Deployment\
  \ context (local mac app, headless gateway host, remote gateway, container/CI).\n\
  8. Disk encryption status (FileVault/LUKS/BitLocker).\n9. OS automatic security\
  \ updates status.\n   Note: these are not blocking items, but are highly recommended,\
  \ especially if OpenC"

name: obsidian
description: Work with Obsidian vaults (plain Markdown notes) and automate via obsidian-cli.
triggers:
- obsidian
- work
- with
- obsidian
- vaults
- (plain
instructions: "# Obsidian\n\nObsidian vault = a normal folder on disk.\n\nVault structure\
  \ (typical)\n\n- Notes: `*.md` (plain text Markdown; edit with any editor)\n- Config:\
  \ `.obsidian/` (workspace + plugin settings; usually don\u2019t touch from scripts)\n\
  - Canvases: `*.canvas` (JSON)\n- Attachments: whatever folder you chose in Obsidian\
  \ settings (images/PDFs/etc.)\n\n## Find the active vault(s)\n\nObsidian desktop\
  \ tracks vaults here (source of truth):\n\n- `~/Library/Application Support/obsidian/obsidian.json`\n\
  \n`obsidian-cli` resolves vaults from that file; vault name is typically the **folder\
  \ name** (path suffix).\n\nFast \u201Cwhat vault is active / where are the notes?\u201D\
  \n\n- If you\u2019ve already set a default: `obsidian-cli print-default --path-only`\n\
  - Otherwise, read `~/Library/Application Support/obsidian/obsidian.json` and use\
  \ the vault entry with `\"open\": true`.\n\nNotes\n\n- Multiple vaults common (iCloud\
  \ vs `~/Documents`, work/personal, etc.). Don\u2019t guess; read config.\n- Avoid\
  \ writing hardcoded vault paths into scripts; prefer reading the config or using\
  \ `print-default`.\n\n## obsidian-cli quick start\n\nPick a default vault (once):\n\
  \n- `obsidian-cli set-default \"<vault-folder-name>\"`\n- `obsidian-cli print-default`\
  \ / `obsidian-cli print-default --path-only`\n\nSearch\n\n- `obsidian-cli search\
  \ \"query\"` (note names)\n- `obsidian-cli search-content \"query\"` (inside notes;\
  \ shows snippets + lines)\n\nCreate\n\n- `obsidian-cli create \"Folder/New note\"\
  \ --content \"...\" --open`\n- Requires Obsidian URI handler (`obsidian://\u2026\
  `) working (Obsidian installed).\n- Avoid creating notes under \u201Chidden\u201D\
  \ dot-folders (e.g. `.something/...`) via URI; Obsidian may refuse.\n\nMove/rename\
  \ (safe refactor)\n\n- `obsidian-cli move \"old/path/note\" \"new/path/note\"`\n\
  - Updates `[[wikilinks]]` and common Markdown links across the vault (this is the\
  \ main win vs `mv`).\n\nDelete\n\n- `obsidian-cli delete \"path/note\"`\n\nPrefer\
  \ direct edits when appropriate: open the `.md` file and change it; Obsidian will\
  \ pick it up."
setup: 'Ensure binary installed: obsidian-cli'

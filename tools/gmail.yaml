name: gmail
description: Manage Gmail via the `gog` CLI (read/search, send, delete) with OAuth.
tier: extended
risky: true
triggers:
- gmail
- google mail
- "@gmail.com"
- send via gmail
- delete gmail
instructions: |
  # Gmail (via `gog`)

  Use this tool when the user explicitly asks to interact with Gmail.

  Scope for this setup:
  - Read/search Gmail messages
  - Send Gmail messages
  - Delete/trash Gmail messages

  Safety:
  - For send/delete actions, require explicit recipient/message target.
  - If recipient or target message is ambiguous, ask a clarifying question first.
  - Prefer listing/searching first, then acting on a specific message ID.

  Preferred setup (user-friendly):
  - Run `python -m src.gmail_setup_tool doctor`
  - Then run `python -m src.gmail_setup_tool authorize --account you@gmail.com --services gmail`
  - For headless/server auth, add `--remote`

  Operator provisioning (once per host, not per user):
  - Set `GOG_OAUTH_CREDENTIALS_PATH=/secure/path/google-oauth-client.json`
  - Or set `GOG_OAUTH_CREDENTIALS_JSON` from secret storage
  - This removes the need for each end user to create their own Google Cloud Console project

  Fallback only if shared credentials are unavailable:
  - `gog auth credentials set /path/to/client_secret.json`
  - `gog auth add you@gmail.com --services gmail`
  - `gog auth list`

  Quick command discovery (run first if syntax is uncertain):
  - `gog gmail --help`
  - `gog gmail messages --help`

  Common flows:
  - Read recent inbox: `gog gmail search "in:inbox newer_than:7d" --max 20 --account you@gmail.com`
  - Search by sender/subject: `gog gmail messages search "in:inbox from:alice@example.com" --max 20 --account you@gmail.com`
  - Send email: `gog gmail send --to bob@example.com --subject "Subject" --body "Text" --account you@gmail.com`
  - Send with body file: `gog gmail send --to bob@example.com --subject "Subject" --body-file ./message.txt --account you@gmail.com`

  Delete/trash:
  - Check available command in help first (`delete` vs `trash` can differ by version).
  - Then execute delete/trash for explicit message IDs only.
  - Example pattern: `gog gmail messages <delete-or-trash> <messageId> --account you@gmail.com`
setup: 'Ensure command is available: python -m src.gmail_setup_tool --help'
